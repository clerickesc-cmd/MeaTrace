<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/account.css" />
</head>

<body class="account-page">
  <div class="shell">
    <div class="card">

      <!-- LEFT -->
      <div class="left"></div>

      <!-- RIGHT -->
      <div class="right">
        <div class="panel">

          <img src="/images/logo.png" alt="MeaTrace SCC" class="logo" />

          <form id="login-form" class="form-underline">
            <!-- Email -->
            <div class="urow">
              <span class="uicon" aria-hidden="true">
                <!-- person/user outline -->
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M4 20c0-3.31 3.58-6 8-6s8 2.69 8 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <input id="email" type="email" placeholder="Email/Phone Number" required />
            </div>

            <!-- Password -->
            <div class="urow">
              <span class="uicon" aria-hidden="true">
                <!-- lock outline -->
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M6.5 11h11A2.5 2.5 0 0 1 20 13.5v6A2.5 2.5 0 0 1 17.5 22h-11A2.5 2.5 0 0 1 4 19.5v-6A2.5 2.5 0 0 1 6.5 11Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>

              <input id="password" type="password" placeholder="Password" required />

              <button type="button" class="eye" id="togglePass" aria-label="Toggle password" aria-pressed="false">
                <!-- eye-off by default (like your screenshot) -->
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M10.6 10.6A2.5 2.5 0 0 0 14 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M9.5 5.6A10.6 10.6 0 0 1 12 5c6 0 10 7 10 7a17 17 0 0 1-3.2 4.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M6.6 6.6C3.9 8.5 2 12 2 12s4 7 10 7c1.3 0 2.5-.3 3.6-.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>

            <div class="row-right">
              <a href="#" class="link" id="forgot">Forgot Password ?</a>
            </div>

            <button class="btn-grad" type="submit">Login</button>

          </form>

        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0rJ7-NMwC-qDIziAiaH4AtSOOWQnEiqY",
      authDomain: "meatrace-7e6f0.firebaseapp.com",
      projectId: "meatrace-7e6f0",
      storageBucket: "meatrace-7e6f0.firebasestorage.app",
      messagingSenderId: "713463510875",
      appId: "1:713463510875:web:d057a91702ee3d11e88c7e",
      measurementId: "G-4SDSMBNVGN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Toggle password + swap icon
    const pass = document.getElementById("password");
    const toggleBtn = document.getElementById("togglePass");
    const eyeIcon = document.getElementById("eyeIcon");

    const eyeSVG = `
      <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    `;

    const eyeOffSVG = `
      <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M10.6 10.6A2.5 2.5 0 0 0 14 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9.5 5.6A10.6 10.6 0 0 1 12 5c6 0 10 7 10 7a17 17 0 0 1-3.2 4.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6.6 6.6C3.9 8.5 2 12 2 12s4 7 10 7c1.3 0 2.5-.3 3.6-.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    `;

    toggleBtn.addEventListener("click", () => {
      const showing = pass.type === "text";
      pass.type = showing ? "password" : "text";
      toggleBtn.setAttribute("aria-pressed", String(!showing));
      eyeIcon.innerHTML = showing ? eyeOffSVG : eyeSVG;
    });

    // Forgot password
    document.getElementById("forgot").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (!email) return alert("Enter your email first.");
      try {
        await sendPasswordResetEmail(auth, email);
        alert("Password reset email sent.");
      } catch (err) {
        alert(err.message);
      }
    });

    // Login
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "/admin-dashboard.html";
      } catch (err) {
        alert("Login failed: " + err.message);
      }
    });
  </script>
</body>
</html>

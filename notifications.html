<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#dddddd;
      --sidebar-top:#9d1010;
      --sidebar-bottom:#230000;
      --white:#ffffff;
      --text:#111111;
      --muted:#6a6a6a;
      --panel:#cfcfcf;
      --panel-2:#bfbfbf;
      --panel-3:#ececec;
      --line:#565656;
      --icon:#1b1b1f;
      --red:#9f1a12;
      --red-dark:#7d120d;
      --radius:20px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      font-family:"Poppins", sans-serif;
      background:#1c1c1c;
      color:var(--text);
      overflow:hidden;
    }

    body{ display:block; }

    .app{
      width:100vw;
      height:100vh;
      background:var(--bg);
      overflow:hidden;
      display:grid;
      grid-template-columns:304px 1fr;
    }

    .sidebar{
      background:linear-gradient(180deg, var(--sidebar-top) 0%, var(--sidebar-bottom) 100%);
      padding:12px 16px 20px;
      display:flex;
      flex-direction:column;
      color:#fff;
      height:100vh;
    }

    .logo-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-top:4px;
      margin-bottom:20px;
    }

    .logo-wrap img{
      width:178px;
      height:auto;
      object-fit:contain;
      display:block;
    }

    .nav{
      display:flex;
      flex-direction:column;
      gap:16px;
      margin-top:18px;
    }

    .nav a{
      display:flex;
      align-items:center;
      gap:16px;
      text-decoration:none;
      color:#fff;
      padding:12px 16px;
      border-radius:22px;
      font-size:18px;
      font-weight:400;
      transition:.2s ease;
    }

    .nav a:hover{ background:rgba(255,255,255,.08); }

    .nav a.active{
      background:#e7e7e7;
      color:#111;
    }

    .nav a svg{
      width:28px;
      height:28px;
      stroke:currentColor;
      flex:0 0 28px;
    }

    .main{
      padding:14px 22px 22px;
      position:relative;
      height:100vh;
      overflow:auto;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
      gap:18px;
    }

    .search-box{
      width:328px;
      height:34px;
      background:#cdcdcd;
      border-radius:18px;
      display:flex;
      align-items:center;
      padding:0 12px;
      gap:8px;
      color:#5d5d5d;
      flex-shrink:0;
    }

    .search-box svg{
      width:18px;
      height:18px;
      stroke:#5d5d5d;
      flex:0 0 18px;
    }

    .search-box input{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      font-family:"Poppins", sans-serif;
      font-size:14px;
      color:#333;
    }

    .search-box input::placeholder{ color:#555; }

    .top-right{
      display:flex;
      align-items:center;
      gap:14px;
      font-weight:600;
      color:#111;
      margin-left:auto;
      position:relative;
    }

    .top-right .bell{
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .top-right .bell svg{
      width:25px;
      height:25px;
      stroke:#1f1b24;
    }

    .profile-dropdown-wrap{
      position:relative;
    }

    .mini-profile{
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      color:#111;
      padding:4px 6px;
      border-radius:14px;
      transition:.2s ease;
      user-select:none;
    }

    .mini-profile:hover{
      background:rgba(0,0,0,.06);
    }

    .mini-profile .avatar{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .mini-profile .avatar svg{
      width:30px;
      height:30px;
      fill:#1f1b24;
    }

    .mini-profile .name{
      font-size:16px;
      font-weight:600;
      white-space:nowrap;
      max-width:220px;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .mini-profile .caret{
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.2s ease;
    }

    .mini-profile .caret svg{
      width:15px;
      height:15px;
      stroke:#111;
    }

    .profile-dropdown-wrap.open .caret{
      transform:rotate(180deg);
    }

    .profile-menu{
      position:absolute;
      right:0;
      top:calc(100% + 8px);
      width:190px;
      background:#fff;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,.18);
      padding:8px;
      display:none;
      z-index:1000;
    }

    .profile-dropdown-wrap.open .profile-menu{
      display:block;
    }

    .profile-menu a,
    .profile-menu button{
      width:100%;
      border:none;
      background:transparent;
      text-decoration:none;
      color:#111;
      font-family:"Poppins", sans-serif;
      font-size:15px;
      padding:12px 12px;
      border-radius:12px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:10px;
      text-align:left;
    }

    .profile-menu a:hover,
    .profile-menu button:hover{
      background:#f1f1f1;
    }

    .profile-menu svg{
      width:18px;
      height:18px;
      stroke:#111;
      fill:none;
      stroke-width:2;
      flex:0 0 18px;
    }

    .page-title{
      font-size:28px;
      font-weight:700;
      margin:4px 0 22px 0;
    }

    .plus-row{
      display:flex;
      justify-content:flex-end;
      margin:-8px 6px 10px 0;
    }

    .plus-btn{
      width:28px;
      height:28px;
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .plus-btn svg{
      width:28px;
      height:28px;
      stroke:#222;
    }

    .editor-shell{
      width:100%;
      background:#c7c7c7;
      border-radius:18px;
      overflow:hidden;
    }

    .editor-titlebar{
      min-height:38px;
      border-bottom:1.5px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
      font-size:17px;
      color:#2a2a2a;
      gap:12px;
    }

    .title-left{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      flex:1;
    }

    .title-left button{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    .title-left svg{
      width:22px;
      height:22px;
      stroke:#222;
    }

    #notificationTitle{
      border:none;
      outline:none;
      background:transparent;
      font-family:"Poppins", sans-serif;
      font-size:17px;
      color:#2a2a2a;
      width:100%;
      max-width:380px;
    }

    .title-actions{
      display:flex;
      align-items:center;
      gap:12px;
      flex-shrink:0;
    }

    .icon-btn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .icon-btn svg{
      width:27px;
      height:27px;
      stroke:#111;
    }

    .toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 12px 6px;
    }

    .toolbar-left{
      display:flex;
      align-items:center;
      gap:4px;
      background:#efefef;
      border-radius:18px;
      padding:5px 8px;
      flex-wrap:wrap;
    }

    .tool-btn{
      border:none;
      background:transparent;
      min-width:24px;
      height:24px;
      border-radius:6px;
      cursor:pointer;
      font-family:"Poppins", sans-serif;
      font-size:15px;
      font-weight:700;
      color:#222;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 4px;
    }

    .tool-btn:hover{
      background:#dadada;
    }

    .tool-divider{
      width:1px;
      height:18px;
      background:#909090;
      margin:0 2px;
    }

    .editor-body-wrap{
      padding:10px 8px 12px;
    }

    .editor-body{
      width:100%;
      min-height:360px;
      background:#efefef;
      border-radius:16px;
      padding:16px 16px 18px;
      outline:none;
      border:none;
      overflow:auto;
      font-size:18px;
      line-height:1.45;
      color:#111;
    }

    .editor-body:empty:before{
      content:attr(data-placeholder);
      color:#8f8f8f;
    }

    .editor-body h2{
      margin:0 0 6px 0;
      font-size:20px;
      font-weight:700;
    }

    .send-row{
      display:flex;
      justify-content:flex-end;
      margin-top:18px;
      padding-right:0;
    }

    .send-btn{
      border:none;
      background:var(--red);
      color:#fff;
      min-width:240px;
      height:38px;
      border-radius:18px;
      font-family:"Poppins", sans-serif;
      font-size:18px;
      font-weight:400;
      cursor:pointer;
      transition:.2s ease;
    }

    .send-btn:hover{
      background:var(--red-dark);
    }

    .address-text{
      margin:18px 0 0 160px;
      color:#efefef;
      font-size:20px;
      font-weight:300;
      letter-spacing:.2px;
      user-select:none;
    }

    @media (max-width: 900px){
      .app{ grid-template-columns:1fr; }
      .sidebar{ display:none; }
      .main{ height:100vh; }
      .topbar{ flex-wrap:wrap; }
      .search-box{ width:100%; }
      .top-right{
        width:100%;
        justify-content:flex-end;
      }
      .editor-titlebar{
        flex-wrap:wrap;
        padding:8px 12px;
      }
      .title-left, .title-actions{ width:100%; }
      #notificationTitle{ max-width:none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo-wrap">
        <img src="/images/logo.png" alt="MeatTrace SCC Logo">
      </div>

      <nav class="nav">
        <a href="/admin-dashboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">

        <a href="/user.html">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">

          </svg>
          <span>User</span>
        </a>

        <a href="/schedule.html">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">

            <path d="M12 7v5l3 3"></path>
          </svg>

        </a>

        <a href="/notifications.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">

            <path d="M10 20a2 2 0 0 0 4 0"></path>
          </svg>
          <span>Notifications</span>
        </a>

        <a href="/settings.html">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.7 1.7 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.82-.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H2.8a2 2 0 1 1 0-4H2.9A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V2.8a2 2 0 1 1 4 0v.1A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.82.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.24.3.4.65.46 1.02.07.38.12.47.12.68s-.05.3-.12.68c-.06.37-.22.72-.46 1.02Z"></path>
          </svg>
          <span>Settings</span>
        </a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
          <input type="text" placeholder="Search" id="searchInput">
        </div>

        <div class="top-right">
          <div class="bell" title="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M15 17H5l1.5-1.5V10a5.5 5.5 0 1 1 11 0v5.5L19 17h-4"></path>
              <path d="M10 20a2 2 0 0 0 4 0"></path>
            </svg>
          </div>

          <div class="profile-dropdown-wrap" id="profileDropdownWrap">
            <div class="mini-profile" id="profileToggle" title="Open Menu">
              <div class="avatar">
                <svg viewBox="0 0 24 24">
                  <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"></path>
                </svg>
              </div>
              <div class="name" id="adminName">Admin</div>
              <div class="caret">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                  <path d="m6 9 6 6 6-6"></path>
                </svg>
              </div>
            </div>

            <div class="profile-menu" id="profileMenu">
              <a href="/settings.html">
                <svg viewBox="0 0 24 24">
                  <path d="M20 21a8 8 0 0 0-16 0"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Profile</span>
              </a>

              <a href="/settings.html">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="3"></circle>
                  <path d="M19.4 15a1.7 1.7 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.82-.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H2.8a2 2 0 1 1 0-4H2.9A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V2.8a2 2 0 1 1 4 0v.1A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.82.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9"></path>
                </svg>
                <span>Settings</span>
              </a>

                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>

          </div>
        </div>
      </div>

      <div class="page-title">Notifications</div>

      <div class="plus-row">
        <button class="plus-btn" id="newNotificationBtn" title="New Notification">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v8"></path>
            <path d="M8 12h8"></path>
          </svg>
        </button>
      </div>

      <section class="editor-shell">
        <div class="editor-titlebar">
          <div class="title-left">
            <button type="button" id="backBtn" title="Back">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="m15 18-6-6 6-6"></path>
                <path d="M21 12H9"></path>
              </svg>
            </button>
            <input id="notificationTitle" type="text" value="Payment Reminder">
          </div>

          <div class="title-actions">
            <button class="icon-btn" id="editBtn" title="Edit Message">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"></path>
              </svg>
            </button>

            <button class="icon-btn" id="saveBtn" title="Save Draft">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
                <path d="M17 21v-8H7v8"></path>
                <path d="M7 3v5h8"></path>
              </svg>
            </button>

            <button class="icon-btn" id="deleteBtn" title="Clear Draft">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M3 6h18"></path>
                <path d="M8 6V4h8v2"></path>
                <path d="M19 6l-1 14H6L5 6"></path>
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
              </svg>
            </button>

        </div>

        <div class="toolbar">

            <button class="tool-btn" data-cmd="bold"><b>B</b></button>
            <button class="tool-btn" data-cmd="italic"><i>I</i></button>
            <button class="tool-btn" data-cmd="underline"><u>U</u></button>
            <button class="tool-btn" data-cmd="insertUnorderedList">•</button>
            <div class="tool-divider"></div>
            <button class="tool-btn" data-cmd="justifyLeft">☰</button>
            <button class="tool-btn" data-cmd="justifyCenter">≡</button>
            <button class="tool-btn" data-cmd="justifyRight">☷</button>
            <button class="tool-btn" data-cmd="justifyFull">▤</button>
          </div>
        </div>

        <div class="editor-body-wrap">
          <div
            id="editor"
            class="editor-body"
            contenteditable="true"
            data-placeholder="Type your notification message here..."
          ><h2>Hello Admin!</h2><div>Just a friendly reminder regarding your upcoming slaughterhouse booking. Please be prepared to settle the balance once the services are completed.</div></div>
        </div>
      </section>

      <div class="send-row">
        <button class="send-btn" id="sendNotificationBtn">Send Notification</button>
      </div>

      <div class="address-text" id="addressText"></div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const adminName = document.getElementById("adminName");
    const editor = document.getElementById("editor");
    const notificationTitle = document.getElementById("notificationTitle");
    const addressText = document.getElementById("addressText");

    const editBtn = document.getElementById("editBtn");
    const saveBtn = document.getElementById("saveBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const newNotificationBtn = document.getElementById("newNotificationBtn");
    const sendNotificationBtn = document.getElementById("sendNotificationBtn");
    const backBtn = document.getElementById("backBtn");

    const profileDropdownWrap = document.getElementById("profileDropdownWrap");
    const profileToggle = document.getElementById("profileToggle");
    const logoutBtn = document.getElementById("logoutBtn");

    let currentAdmin = null;

    function defaultMessage(name = "User") {
      return `<h2>Hello ${name}!</h2><div>Just a friendly reminder regarding your upcoming slaughterhouse booking. Please be prepared to settle the balance once the services are completed.</div>`;
    }

    async function loadAdmin(user) {
      currentAdmin = user;

      let fullName = user.displayName || "Admin";
      let address = "";
      let email = user.email || "";

      try {
        const adminRef = doc(db, "admins", user.uid);
        const snap = await getDoc(adminRef);

        if (snap.exists()) {
          const data = snap.data();

          const firestoreName =
            data.fullName ||
            [data.firstName, data.lastName].filter(Boolean).join(" ").trim();

          if (firestoreName) fullName = firestoreName;

          address =
            data.address ||
            [data.city, data.country].filter(Boolean).join(", ");

          email = data.email || email;
        }
      } catch (err) {
        console.error("Failed to load admin info:", err);
      }

      adminName.textContent = fullName || "Admin";
      addressText.textContent = address || email || "";
      editor.innerHTML = defaultMessage(fullName || "Admin");
    }

   

    document.querySelectorAll(".tool-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const cmd = btn.dataset.cmd;
        document.execCommand(cmd, false, null);
        editor.focus();
      });
    });

    editBtn.addEventListener("click", () => {
      editor.focus();
    });

    saveBtn.addEventListener("click", async () => {
      if (!currentAdmin) {
        alert("No admin account found.");
        return;
      }

      const title = notificationTitle.value.trim();
      const messageHtml = editor.innerHTML.trim();
      const messageText = editor.innerText.trim();

      if (!title || !messageText) {
        alert("Please enter a title and message first.");
        return;
      }

      try {
        await addDoc(collection(db, "notification_drafts"), {
          adminUid: currentAdmin.uid,
          adminEmail: currentAdmin.email || "",
          adminName: adminName.textContent.trim() || "Admin",
          title,
          messageHtml,
          messageText,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        alert("Draft saved successfully.");
      } catch (error) {
        console.error("Save draft error:", error);
        alert("Failed to save draft.");
      }
    });

    deleteBtn.addEventListener("click", () => {
      const ok = confirm("Clear this notification draft?");
      if (!ok) return;

      notificationTitle.value = "";
      editor.innerHTML = "";
      editor.focus();
    });

    newNotificationBtn.addEventListener("click", () => {
      const ok = confirm("Create a new notification?");
      if (!ok) return;

      const name = adminName.textContent.trim() || "User";
      notificationTitle.value = "New Notification";
      editor.innerHTML = defaultMessage(name);
      editor.focus();
    });

    backBtn.addEventListener("click", () => {
      history.back();
    });

    sendNotificationBtn.addEventListener("click", async () => {
      if (!currentAdmin) {
        alert("No admin account found.");
        return;
      }

      const title = notificationTitle.value.trim();
      const messageHtml = editor.innerHTML.trim();
      const messageText = editor.innerText.trim();

      if (!title || !messageText) {
        alert("Please enter a title and message first.");
        return;
      }

      try {
        await addDoc(collection(db, "notifications"), {
          title,
          messageHtml,
          messageText,
          sentByUid: currentAdmin.uid,
          sentByEmail: currentAdmin.email || "",
          sentByName: adminName.textContent.trim() || "Admin",
          audience: "all_users",
          isRead: false,
          createdAt: serverTimestamp()
        });

        alert("Notification sent successfully.");
      } catch (error) {
        console.error("Send notification error:", error);
        alert("Failed to send notification.");
      }
    });

    profileToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      profileDropdownWrap.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
      if (!profileDropdownWrap.contains(e.target)) {
        profileDropdownWrap.classList.remove("open");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      const ok = confirm("Are you sure you want to log out?");
      if (!ok) return;

      try {
        await signOut(auth);
        window.location.href = "/admin-login-form.html";
      } catch (error) {
        console.error("Logout error:", error);
        alert("Failed to log out.");
      }
    });
  </script>
</body>
</html>

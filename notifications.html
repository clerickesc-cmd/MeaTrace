<!-- ✅ notifications.html (FULL PAGE) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications</title>

  <!-- ✅ EXACT font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- keep if you already use it -->
  <link rel="stylesheet" href="/dashboard.css" />

  <style>
    :root{
      --bg:#ececec;
      --panel:#cfcfcf;
      --text:#111;
      --muted:#6b6b6b;

      --maroon:#7a0b0b;
      --maroon2:#4b0707;

      --white:#fff;
      --radius:18px;
      --shadow:0 10px 25px rgba(0,0,0,.12);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:"Poppins",sans-serif;
      background:#111;
    }

    /* ===== Layout ===== */
    .dash-body{ margin:0; padding:0; background:#111; }
    .dash{
      width:100vw;
      height:100vh;
      display:grid;
      grid-template-columns: 320px 1fr;
      overflow:hidden;
      background:#111;
    }

    /* ===== Sidebar ===== */
    .dash-sidebar{
      background: linear-gradient(180deg, var(--maroon) 0%, #6b0a0a 35%, #3b0505 100%);
      padding:22px 18px;
      color:#fff;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .dash-logoWrap{
      display:flex;
      justify-content:center;
      padding:6px 0 10px;
    }
    .dash-logo{
      width:168px;
      height:auto;
      display:block;
    }

    .dash-nav{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:2px;
    }

    .dash-link{
      display:flex;
      align-items:center;
      gap:14px;
      padding:12px 14px;
      border-radius:18px;
      color:#fff;
      text-decoration:none;
      font-weight:500;
      letter-spacing:.2px;
      position:relative;
    }
    .dash-link:hover{ background: rgba(255,255,255,.10); }

    .dash-link .ico{
      width:26px; height:26px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex:0 0 26px;
    }
    .dash-link svg{
      width:24px; height:24px;
      fill:none;
      stroke:#fff;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .dash-link span.label{
      font-size:18px;
      font-weight:500;
    }

    /* active pill like screenshot */
    .dash-link.active{
      background:#e7e7e7;
      color:#111;
      border-radius:22px;
    }
    .dash-link.active svg{ stroke:#111; }

    /* ===== Main ===== */
    .dash-main{
      background:#e9e9e9;
      padding:18px 26px;
      overflow:auto;
      position:relative;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .searchWrap{
      display:flex;
      align-items:center;
      gap:10px;
      width:520px;
      max-width:58vw;
      background:#d7d7d7;
      border-radius:22px;
      padding:10px 14px;
    }
    .searchWrap svg{ width:18px; height:18px; stroke:#555; }
    .searchWrap input{
      border:none;
      outline:none;
      width:100%;
      font-family:"Poppins",sans-serif;
      background:transparent;
      font-size:14px;
      color:#222;
    }

    .topRight{
      display:flex;
      align-items:center;
      gap:12px;
      position:relative;
    }
    .iconBtn{
      width:36px; height:36px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background:transparent;
      border:none;
      cursor:pointer;
    }
    .iconBtn svg{ width:22px; height:22px; stroke:#111; }

    .userBox{
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px 8px;
      border-radius:16px;
      cursor:pointer;
      user-select:none;
    }
    .avatar{
      width:28px; height:28px;
      border-radius:50%;
      background:#d3d3d3;
      display:grid;
      place-items:center;
      color:#222;
      font-weight:700;
      font-size:13px;
    }
    .userName{
      font-weight:600;
      color:#111;
      font-size:14px;
      white-space:nowrap;
    }
    .chev{
      width:16px; height:16px;
      stroke:#111;
      transition:.15s transform ease;
    }
    .userBox.open .chev{ transform: rotate(180deg); }

    /* dropdown */
    .userMenu{
      position:absolute;
      top:52px;
      right:0;
      background:#fff;
      border-radius:14px;
      box-shadow: var(--shadow);
      width:210px;
      padding:8px;
      display:none;
      z-index:50;
    }
    .userMenu.open{ display:block; }
    .userMenu .meta{
      padding:10px 10px 8px;
      border-bottom:1px solid #eee;
    }
    .userMenu .meta .role{
      font-size:12px;
      font-weight:700;
      color:#7a0b0b;
      letter-spacing:.4px;
    }
    .userMenu .meta .email{
      font-size:12px;
      color:#555;
      margin-top:2px;
      word-break:break-all;
    }
    .userMenu button{
      width:100%;
      border:none;
      background:transparent;
      font-family:"Poppins",sans-serif;
      padding:10px;
      border-radius:12px;
      cursor:pointer;
      text-align:left;
      font-weight:600;
      color:#111;
    }
    .userMenu button:hover{ background:#f3f3f3; }

    /* ===== Title Row ===== */
    .titleRow{
      display:flex;
      align-items:center;
      gap:12px;
      margin:14px 0 12px;
    }
    .pageTitle{
      margin:0;
      font-size:32px;
      font-weight:700;
      color:#111;
      letter-spacing:.2px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:12px;
      background:#d0d0d0;
      color:#222;
      font-size:13px;
      font-weight:500;
    }
    .chip svg{ width:16px; height:16px; stroke:#333; }

    /* ===== Cards ===== */
    .cards{
      display:flex;
      flex-direction:column;
      gap:22px;
      margin-top:10px;
      max-width: 860px; /* matches screenshot spacing */
    }
    .noteCard{
      background:#cfcfcf;
      border-radius:16px;
      padding:18px 18px;
      min-height:72px;
    }
    .noteTitle{
      font-size:20px;
      font-weight:700;
      color:#111;
      margin:0 0 4px;
      line-height:1.1;
    }
    .noteText{
      margin:0;
      color:#222;
      font-size:15px;
      line-height:1.35;
      max-width: 760px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* empty cards */
    .noteCard.empty{
      padding:0;
      min-height:86px;
    }

    /* subtle "Address" like faint center text */
    .ghost{
      position:absolute;
      left:50%;
      bottom:50px;
      transform:translateX(-50%);
      color:#f0f0f0;
      font-size:12px;
      font-weight:600;
      opacity:.45;
      pointer-events:none;
    }

    @media (max-width: 900px){
      .dash{ grid-template-columns: 280px 1fr; }
      .dash-link span.label{ font-size:16px; }
      .searchWrap{ width: 380px; }
      .cards{ max-width: 100%; }
      .noteText{ max-width: 100%; }
    }
  </style>
</head>

<body class="dash-body">
  <div class="dash">

    <!-- ===== SIDEBAR ===== -->
    <aside class="dash-sidebar">
      <div class="dash-logoWrap">
        <img src="/images/logo.png" class="dash-logo" alt="MeatTrace SCC" />
      </div>

      <nav class="dash-nav">
        <a class="dash-link" href="/admin-dashboard.html">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/></svg>
          </span>
          <span class="label">Dashboard</span>
        </a>

        <a class="dash-link" href="/appointment.html">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 19a2 2 0 0 0 2 2h14"/><path d="M6 2h14v18H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z"/></svg>
          </span>
          <span class="label">Appointment</span>
        </a>

        <a class="dash-link" href="/vetinspection.html">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z"/><path d="m8 12 2.5 2.5L16.5 9"/></svg>
          </span>
          <span class="label">Vet Inspection</span>
        </a>

        <a class="dash-link" href="/payment.html">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 7v10"></path>
              <path d="M9.5 9.2c.6-1 1.6-1.7 2.5-1.7 1.8 0 3 1 3 2.3 0 1.4-1.4 2.1-3 2.1s-3 .7-3 2.1c0 1.3 1.2 2.3 3 2.3 1.2 0 2.2-.6 2.7-1.5"></path>
            </svg>
          </span>
          <span class="label">Payment</span>
        </a>

        <a class="dash-link" href="/user.html">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 1 0-16 0"/><path d="M12 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"/></svg>
          </span>
          <span class="label">User</span>
        </a>

        <a class="dash-link" href="/schedule.html">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v6l3.5 2"></path></svg>
          </span>
          <span class="label">Schedule</span>
        </a>

        <!-- ✅ ACTIVE: Notifications -->
        <a class="dash-link active" href="/notifications.html">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
              <path d="M13.7 21a2 2 0 0 1-3.4 0"></path>
            </svg>
          </span>
          <span class="label">Notifications</span>
        </a>

        <a class="dash-link" href="/setting.html">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0-3.5-3.5 3.5 3.5 0 0 0 3.5 3.5Z"/>
              <path d="M19.4 15a7.9 7.9 0 0 0 .1-2l2-1.2-2-3.4-2.3.6a7.7 7.7 0 0 0-1.7-1l-.3-2.4H9.8L9.5 8a7.7 7.7 0 0 0-1.7 1l-2.3-.6-2 3.4 2 1.2a7.9 7.9 0 0 0 .1 2l-2 1.2 2 3.4 2.3-.6a7.7 7.7 0 0 0 1.7 1l.3 2.4h5.4l.3-2.4a7.7 7.7 0 0 0 1.7-1l2.3.6 2-3.4Z"/>
            </svg>
          </span>
          <span class="label">Settings</span>
        </a>
      </nav>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="dash-main">

      <!-- Top bar -->
      <div class="topbar">
        <div class="searchWrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20l-3.5-3.5"></path>
          </svg>
          <input id="searchInput" type="text" placeholder="Search" />
        </div>

        <div class="topRight">
          <button id="bellBtn" class="iconBtn" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
              <path d="M13.7 21a2 2 0 0 1-3.4 0"></path>
            </svg>
          </button>

          <div id="userBox" class="userBox" role="button" tabindex="0" aria-label="Admin menu">
            <div id="avatar" class="avatar">J</div>
            <div id="userName" class="userName">Janelle Soria</div>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </div>

          <div id="userMenu" class="userMenu" aria-label="User dropdown">
            <div class="meta">
              <div class="role">ADMIN</div>
              <div id="userEmail" class="email">—</div>
            </div>
            <button id="goSettings" type="button">Settings</button>
            <button id="logoutBtn" type="button">Log out</button>
          </div>
        </div>
      </div>

      <!-- Title -->
      <div class="titleRow">
        <h1 class="pageTitle">Notifications</h1>

            <path d="M21 8v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8"></path>
            <path d="M3 8l2-4h14l2 4"></path>
            <path d="M10 12h4"></path>
          </svg>
          Archived
        </div>
      </div>

      <!-- Cards -->
      <section class="cards" aria-label="Notifications list">
        <div class="noteCard">
          <h3 class="noteTitle">Payment Reminder</h3>
          <p class="noteText">Just a friendly reminder regarding your upcoming slaughterhouse booking. Please.....</p>
        </div>

        <div class="noteCard empty" aria-hidden="true"></div>
        <div class="noteCard empty" aria-hidden="true"></div>
      </section>

      <div class="ghost">Address</div>
    </main>
  </div>

  <!-- ✅ Firebase (AUTH) + Dropdown + Redirects -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    // 🔁 Replace with YOUR Firebase config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const userBox     = document.getElementById("userBox");
    const userMenu    = document.getElementById("userMenu");
    const avatarEl    = document.getElementById("avatar");
    const userNameEl  = document.getElementById("userName");
    const userEmailEl = document.getElementById("userEmail");
    const goSettings  = document.getElementById("goSettings");
    const logoutBtn   = document.getElementById("logoutBtn");

    // Auth guard + show user info
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "/admin-login-form.html"; // ✅ avoid /login.html 404
        return;
      }
      const display = user.displayName || (user.email ? user.email.split("@")[0] : "Admin");
      userNameEl.textContent = display;
      userEmailEl.textContent = user.email || "—";
      avatarEl.textContent = (display?.trim()?.[0] || "A").toUpperCase();
    });

    function toggleMenu(force) {
      const open = typeof force === "boolean" ? force : !userMenu.classList.contains("open");
      userMenu.classList.toggle("open", open);
      userBox.classList.toggle("open", open);
    }

    userBox.addEventListener("click", () => toggleMenu());
    userBox.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggleMenu();
      }
    });

    document.addEventListener("click", (e) => {
      if (!userMenu.contains(e.target) && !userBox.contains(e.target)) toggleMenu(false);
    });

    goSettings.addEventListener("click", () => {
      window.location.href = "/setting.html"; // change to /settings.html if your file is settings.html
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "/admin-login-form.html";
      } catch (err) {
        console.error(err);
        alert("Logout failed.");
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Schedule</title>

  <!-- ✅ EXACT font like screenshots -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/dashboard.css" />

  <style>
    /* ✅ ONLY additions for schedule layout like screenshot (no font changes) */
    .pagePad{ padding: 22px 26px 28px; }
    .pageTitle{
      margin: 8px 0 10px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .schedTopRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    .legend{
      display:flex;
      align-items:center;
      gap: 10px;
      margin-top: 8px;
    }
    .legChip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height: 24px;
      padding: 0 10px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      border-radius: 2px;
      letter-spacing: .3px;
      user-select:none;
    }
    .legBooked{ background:#f0b400; }  /* FULLY BOOKED (yellow) */
    .legAvail { background:#7a0b0b; }  /* AVAILABLE (maroon) */
    .legClosed{ background:#707070; }  /* CLOSED (gray) */

    .pickerRow{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 6px 0 10px;
    }
    .pickerRow select{
      width: 100%;
      height: 28px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,.25);
      background: #efefef;
      font: inherit;
      padding: 0 10px;
      outline: none;
    }

    .calCard{
      background:#cfcfcf;
      border: 1px solid rgba(0,0,0,.18);
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
      border-radius: 2px;
      padding: 18px 18px 14px;
      min-height: 520px;
    }

    .monthTitle{
      text-align:center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: .8px;
      margin: 6px 0 18px;
      text-transform: uppercase;
    }

    .dowRow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      margin-bottom: 10px;
      padding: 0 18px;
      color:#111;
      opacity:.9;
      font-weight: 500;
    }
    .dowRow div{
      text-align:center;
      font-size: 14px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 18px 18px;
      padding: 0 18px 10px;
    }

    .dayBtn{
      width: 54px;
      height: 54px;
      border-radius: 999px;
      border: none;
      background: transparent;
      display:flex;
      align-items:center;
      justify-content:center;
      font: inherit;
      font-size: 18px;
      cursor: pointer;
      user-select:none;
      margin: 0 auto;
      color:#111;
      transition: filter .12s ease;
    }
    .dayBtn:hover{ filter: brightness(1.03); }

    /* state colors like screenshot */
    .isBooked{ background:#f0b400; }              /* yellow circles */
    .isAvail { background:#7a0b0b; color:#111; }  /* maroon circles */
    .isClosed{ background:#707070; color:#111; }  /* gray circles */

    /* selected outline */
    .isSelected{
      outline: 4px solid rgba(0,0,0,.25);
      outline-offset: 2px;
    }

    /* bottom action buttons */
    .actionsRow{
      display:flex;
      justify-content:flex-end;
      gap: 10px;
      margin-top: 10px;
    }
    .actBtn{
      height: 22px;
      padding: 0 10px;
      border: none;
      border-radius: 2px;
      font: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .4px;
      color:#fff;
      background:#6a6a6a;
      display:inline-flex;
      align-items:center;
      gap: 6px;
      cursor:pointer;
      user-select:none;
      transition: filter .12s ease;
    }
    .actBtn:hover{ filter: brightness(1.05); }
    .actBtn:disabled{
      opacity:.55;
      cursor:not-allowed;
      filter:none;
    }
    .actBtn svg{ width: 12px; height: 12px; display:block; }

    /* optional: show SELECT active as maroon (still fine when toggling) */
    .actBtn.isActive{
      background:#7a0b0b;
    }

    .emptyCell{
      width: 54px;
      height: 54px;
      margin: 0 auto;
      opacity: 0;
      pointer-events:none;
    }

    @media (max-width: 1000px){
      .grid{ gap: 14px; padding: 0 10px; }
      .dowRow{ padding: 0 10px; }
      .dayBtn{ width: 48px; height: 48px; }
      .calCard{ min-height: 520px; }
      .pickerRow{ grid-template-columns: 1fr; }
      .legend{ flex-wrap: wrap; justify-content:flex-end; }
    }
  </style>
</head>

    <!-- MAIN -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0rJ7-NMwC-qDIziAiaH4AtSOOWQnEiqY",
      authDomain: "meatrace-7e6f0.firebaseapp.com",
      projectId: "meatrace-7e6f0",
      storageBucket: "meatrace-7e6f0.firebasestorage.app",
      messagingSenderId: "713463510875",
      appId: "1:713463510875:web:d057a91702ee3d11e88c7e",
      measurementId: "G-4SDSMBNVGN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const apptCol = collection(db, "appointments");

    const pad2 = (x) => String(x).padStart(2, "0");
    const safeText = (x) => (x ?? "").toString();

    // ===== top-right user menu =====
    const userChip = document.getElementById("userChip");
    const userBtn  = document.getElementById("userBtn");
    const userMenu = document.getElementById("userMenu");
    const logoutBtn = document.getElementById("logoutBtn");

    function openUserMenu(open) {
      userMenu.setAttribute("aria-hidden", String(!open));
      userChip.setAttribute("aria-expanded", String(open));
    }
    userBtn.addEventListener("click", () => {
      const isOpen = userMenu.getAttribute("aria-hidden") === "false";
      openUserMenu(!isOpen);
    });
    document.addEventListener("click", (e) => {
      if (!userChip.contains(e.target)) openUserMenu(false);
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") openUserMenu(false);
    });
    logoutBtn.addEventListener("click", async () => {
      try { await signOut(auth); } catch (e) {}
      window.location.href = "/login.html";
    });

    const adminNameEl = document.getElementById("adminName");
    const menuNameEl = document.getElementById("menuName");
    const menuEmailEl = document.getElementById("menuEmail");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        const name = user.displayName || "Admin";
        const email = user.email || "admin@email.com";
        adminNameEl.textContent = name;
        menuNameEl.textContent = name;
        menuEmailEl.textContent = email;
      } else {
        window.location.href = "/login.html";
      }
    });

    // ===== Calendar state =====
    const monthSel = document.getElementById("monthSel");
    const yearSel  = document.getElementById("yearSel");
    const monthTitle = document.getElementById("monthTitle");
    const grid = document.getElementById("grid");

    const removeBtn = document.getElementById("removeBtn");
    const selectBtn = document.getElementById("selectBtn");

    const MONTHS = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];

    let selectedKey = "";
    let statusMap = new Map();

    function ymdFromParts(y,m,d){ return `${y}-${pad2(m+1)}-${pad2(d)}`; }

    function setButtons(){
      const has = !!selectedKey;
      removeBtn.disabled = !has;
      selectBtn.disabled = !has;
      if (!has) selectBtn.classList.remove("isActive");
    }

    function setSelected(key){
      selectedKey = key;
      setButtons();
      renderCalendar();
    }

    function fillDropdowns(){
      monthSel.innerHTML = MONTHS.map((m,i)=> `<option value="${i}">${m}</option>`).join("");

      const now = new Date();
      const y0 = now.getFullYear() - 2;
      const y1 = now.getFullYear() + 6;

      let yOps = "";
      for (let y=y0; y<=y1; y++) yOps += `<option value="${y}">${y}</option>`;
      yearSel.innerHTML = yOps;
    }

    async function buildStatusMap(y, m){
      statusMap = new Map();

      // default: weekdays available, Saturdays closed (matches screenshot)
      const daysInMonth = new Date(y, m+1, 0).getDate();
      for (let d=1; d<=daysInMonth; d++){
        const wd = new Date(y, m, d).getDay();
        const key = ymdFromParts(y,m,d);
        statusMap.set(key, wd === 6 ? "closed" : "available");
      }

      // Optional: auto mark booked from appointments
      let snap;
      try{
        const start = `${y}-${pad2(m+1)}-01`;
        const end = `${y}-${pad2(m+1)}-31`;
        snap = await getDocs(query(apptCol, where("dateKey", ">=", start), where("dateKey", "<=", end)));
      }catch(e){
        snap = await getDocs(query(apptCol, orderBy("createdAt","desc"), limit(300)));
      }

      const counts = new Map();
      snap.forEach(docu => {
        const a = docu.data();
        const key = safeText(a.dateKey || "");
        if (!key) return;
        if (!key.startsWith(`${y}-${pad2(m+1)}-`)) return;
        counts.set(key, (counts.get(key)||0) + 1);
      });

      const FULLY_BOOKED_AT = 999999; // keep high so your manual toggle controls colors

      for (const [key, c] of counts.entries()){
        if (statusMap.get(key) === "closed") continue;
        if (c >= FULLY_BOOKED_AT) statusMap.set(key, "booked");
      }
    }

    function renderCalendar(){
      const y = Number(yearSel.value);
      const m = Number(monthSel.value);

      monthTitle.textContent = MONTHS[m].toUpperCase();

      const firstDow = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m+1, 0).getDate();

      let html = "";
      for (let i=0; i<firstDow; i++) html += `<div class="emptyCell"></div>`;

      for (let d=1; d<=daysInMonth; d++){
        const key = ymdFromParts(y,m,d);
        const st = statusMap.get(key) || "available";

        const cls =
          st === "booked" ? "dayBtn isBooked" :
          st === "closed" ? "dayBtn isClosed" :
          "dayBtn isAvail";

        const selCls = (selectedKey === key) ? " isSelected" : "";
        html += `<button class="${cls}${selCls}" type="button" data-key="${key}">${d}</button>`;
      }

      grid.innerHTML = html;

      grid.querySelectorAll("button.dayBtn").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.key;
          setSelected(selectedKey === key ? "" : key);
        });
      });
    }

    async function refresh(){
      const y = Number(yearSel.value);
      const m = Number(monthSel.value);
      await buildStatusMap(y, m);

      if (selectedKey && !selectedKey.startsWith(`${y}-${pad2(m+1)}-`)) selectedKey = "";
      setButtons();
      renderCalendar();
    }

    // ✅ SELECT: toggle ONLY between YELLOW(booked) and MAROON(available)
    selectBtn.addEventListener("click", () => {
      if (!selectedKey) return;

      const cur = statusMap.get(selectedKey) || "available";
      if (cur === "booked") statusMap.set(selectedKey, "available");
      else statusMap.set(selectedKey, "booked"); // includes closed -> booked if you selected a closed day

      // button active style optional
      selectBtn.classList.add("isActive");
      renderCalendar();
    });

    // ✅ REMOVE: always change selected day to GRAY(closed)
    removeBtn.addEventListener("click", () => {
      if (!selectedKey) return;
      statusMap.set(selectedKey, "closed");
      selectBtn.classList.remove("isActive");
      renderCalendar();
    });

    monthSel.addEventListener("change", refresh);
    yearSel.addEventListener("change", refresh);

    (async function init(){
      fillDropdowns();
      const now = new Date();
      monthSel.value = String(now.getMonth());
      yearSel.value = String(now.getFullYear());
      await refresh();
    })();
  </script>
</body>

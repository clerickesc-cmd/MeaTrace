<!-- ✅ setting.html (FULL PAGE) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/dashboard.css" />

  <style>
    :root{
      --bg:#ececec;
      --panel:#cfcfcf;
      --dark:#111;
      --muted:#666;

      --maroon:#7a0b0b;
      --maroon2:#4b0707;

      --radius:18px;
      --shadow:0 10px 25px rgba(0,0,0,.12);

      --card:#d1d1d1;
      --left:#6f6f6f;
      --white:#fff;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:"Poppins",sans-serif;
      background:#111;
    }

    /* ====== App Layout ====== */
    .dash{
      width:100vw;
      height:100vh;
      display:grid;
      grid-template-columns: 320px 1fr;
      overflow:hidden;
      background:#111;
    }

    /* ====== Sidebar ====== */
    .dash-sidebar{
      background: linear-gradient(180deg, var(--maroon) 0%, #6b0a0a 35%, #3b0505 100%);
      padding:22px 18px;
      color:#fff;
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    .dash-logoWrap{ display:flex; justify-content:center; padding:6px 0 10px; }
    .dash-logo{ width:160px; height:auto; display:block; }

    .dash-nav{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:6px;
    }
    .dash-link{
      display:flex;
      align-items:center;
      gap:14px;
      padding:12px 14px;
      border-radius:18px;
      color:#fff;
      text-decoration:none;
      font-weight:500;
      letter-spacing:.2px;
    }
    .dash-link:hover{ background: rgba(255,255,255,.10); }
    .dash-link .ico{
      width:24px; height:24px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex:0 0 24px;
    }
    .dash-link svg{
      width:22px; height:22px;
      fill:none; stroke:#fff;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .dash-link.active{
      background:#d9d9d9;
      color:#111;
    }
    .dash-link.active svg{ stroke:#111; }

    /* ====== Main ====== */
    .dash-main{
      background:var(--bg);
      padding:22px 26px;
      overflow:auto;
      position:relative;
    }

    /* Top right header icons */
    .topRightBar{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:14px;
      margin-bottom:8px;
    }
    .iconBtn{
      width:34px; height:34px;
      border-radius:10px;
      display:grid;
      place-items:center;
      background:transparent;
      border:none;
      cursor:pointer;
    }
    .iconBtn svg{ width:22px; height:22px; stroke:#111; fill:none; stroke-width:2; }

    .miniUser{
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      user-select:none;
    }
    .miniAvatar{
      width:28px; height:28px;
      border-radius:50%;
      background:#d9d9d9;
      display:grid;
      place-items:center;
      font-weight:700;
      color:#222;
      font-size:12px;
    }
    .miniName{
      font-weight:600;
      font-size:14px;
      color:#111;
      white-space:nowrap;
    }
    .miniChev{
      width:18px; height:18px;
      stroke:#111;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    /* "Today's Schedules" label */
    .todays{
      position:absolute;
      right:36px;
      top:92px;
      display:flex;
      align-items:center;
      gap:8px;
      color:#fff;
      opacity:.9;
      font-weight:500;
      font-size:14px;
      pointer-events:auto;
      cursor:pointer;
    }
    .todays svg{ width:16px; height:16px; stroke:#fff; fill:none; stroke-width:2; }

    /* ====== Profile Card ====== */
    .profileCard{
      width:min(820px, 92%);
      margin:70px auto 0;
      border-radius:18px;
      overflow:hidden;
      background:var(--card);
      box-shadow:none;
      border:1px solid rgba(0,0,0,.08);
    }
    .profileHead{
      background:rgba(122, 11, 11, 0.92);
      color:#fff;
      padding:18px 22px;
      font-size:28px;
      font-weight:700;
      line-height:1;
    }

    .profileBody{
      display:grid;
      grid-template-columns: 230px 1fr;
      min-height:460px;
    }

    /* left gray panel inside card */
    .profileLeft{
      background:var(--left);
      padding:26px 22px;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
    }

    .bigAvatar{
      width:90px; height:90px;
      border-radius:50%;
      background:#e6e6e6;
      display:grid;
      place-items:center;
      margin-bottom:14px;
    }
    .bigAvatar svg{
      width:56px; height:56px;
      stroke:#111;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
      opacity:.9;
    }

    .adminName{
      font-size:24px;
      font-weight:500;
      line-height:1.1;
      margin-top:2px;
    }
    .adminEmail{
      font-size:14px;
      opacity:.95;
      margin-top:2px;
      margin-bottom:26px;
    }

    .leftMenu{
      display:flex;
      flex-direction:column;
      gap:16px;
      margin-top:10px;
      font-size:18px;
      font-weight:500;
    }
    .leftMenu button{
      background:transparent;
      border:none;
      color:#fff;
      font-family:"Poppins",sans-serif;
      font-size:18px;
      text-align:left;
      cursor:pointer;
      padding:0;
      opacity:.95;
    }
    .leftMenu button:hover{ opacity:1; }

    .logoutBtn{
      margin-top:auto;
      align-self:flex-start;
      background:#d9d9d9;
      color:#111;
      border:none;
      border-radius:22px;
      padding:10px 28px;
      font-family:"Poppins",sans-serif;
      font-weight:600;
      cursor:pointer;
    }
    .logoutBtn:hover{ filter:brightness(.98); }

    /* right gray blank area */
    .profileRight{ background:var(--card); }

    /* dropdown */
    .userMenu{
      position:absolute;
      top:52px;
      right:26px;
      background:#fff;
      border-radius:14px;
      box-shadow: var(--shadow);
      width:210px;
      padding:8px;
      display:none;
      z-index:50;
    }
    .userMenu.open{ display:block; }
    .userMenu .meta{
      padding:10px 10px 8px;
      border-bottom:1px solid #eee;
    }
    .userMenu .meta .role{
      font-size:12px;
      font-weight:700;
      color:#7a0b0b;
      letter-spacing:.4px;
    }
    .userMenu .meta .email{
      font-size:12px;
      color:#555;
      margin-top:2px;
      word-break:break-all;
    }
    .userMenu button{
      width:100%;
      border:none;
      background:transparent;
      font-family:"Poppins",sans-serif;
      padding:10px;
      border-radius:12px;
      cursor:pointer;
      text-align:left;
      font-weight:600;
      color:#111;
    }
    .userMenu button:hover{ background:#f3f3f3; }
  </style>
</head>

<body>
  <div class="dash">
    <!-- ===== SIDEBAR ===== -->
    <aside class="dash-sidebar">
      <div class="dash-logoWrap">
        <img src="/images/logo.png" class="dash-logo" alt="MeatTrace SCC" />
      </div>

      <nav class="dash-nav">
        <a class="dash-link" href="/admin-dashboard.html">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/></svg></span>
          <span>Dashboard</span>
        </a>

        <a class="dash-link" href="/appointment.html">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M4 19a2 2 0 0 0 2 2h14"/><path d="M6 2h14v18H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z"/></svg></span>
          <span>Appointment</span>
        </a>

        <a class="dash-link" href="/vetinspection.html">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z"/><path d="m8 12 2.5 2.5L16.5 9"/></svg></span>
          <span>Vet Inspection</span>
        </a>

        <a class="dash-link" href="/payment.html">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M12 2v20"/><path d="M17 6.5c0-1.9-2.2-3.5-5-3.5s-5 1.6-5 3.5S9.2 10 12 10s5 1.6 5 3.5S14.8 17 12 17s-5-1.6-5-3.5"/></svg></span>
          <span>Payment</span>
        </a>

        <a class="dash-link" href="/user.html">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 1 0-16 0"/><path d="M12 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"/></svg></span>
          <span>User</span>
        </a>

        <a class="dash-link" href="/schedule.html">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z"/><path d="M12 6v6l4 2"/></svg></span>
          <span>Schedule</span>
        </a>

        <a class="dash-link" href="/notifications.html">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg></span>
          <span>Notifications</span>
        </a>

        <a class="dash-link active" href="/setting.html">
          <span class="ico">
            <svg viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0-3.5-3.5 3.5 3.5 0 0 0 3.5 3.5Z"/>
              <path d="M19.4 15a7.9 7.9 0 0 0 .1-2l2-1.2-2-3.4-2.3.6a7.7 7.7 0 0 0-1.7-1l-.3-2.4H9.8L9.5 8a7.7 7.7 0 0 0-1.7 1l-2.3-.6-2 3.4 2 1.2a7.9 7.9 0 0 0 .1 2l-2 1.2 2 3.4 2.3-.6a7.7 7.7 0 0 0 1.7 1l.3 2.4h5.4l.3-2.4a7.7 7.7 0 0 0 1.7-1l2.3.6 2-3.4Z"/>
            </svg>
          </span>
          <span>Settings</span>
        </a>
      </nav>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="dash-main">
      <div class="topRightBar">
        <button id="bellBtn" class="iconBtn" aria-label="Notifications">
          <svg viewBox="0 0 24 24">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
            <path d="M13.7 21a2 2 0 0 1-3.4 0"></path>
          </svg>
        </button>

        <div id="miniUser" class="miniUser" role="button" tabindex="0" aria-label="Admin menu">
          <div id="miniAvatar" class="miniAvatar">A</div>
          <div id="miniName" class="miniName">Admin</div>
          <svg class="miniChev" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>

      <div id="userMenu" class="userMenu">
        <div class="meta">
          <div class="role">ADMIN</div>
          <div id="menuEmail" class="email">—</div>
        </div>
        <button id="menuProfile" type="button">Profile</button>
        <button id="menuLogout" type="button">Log out</button>
      </div>

      <div id="todaysBtn" class="todays" title="Go to Today's Schedules">
        <svg viewBox="0 0 24 24">
          <path d="M8 3v2"/><path d="M16 3v2"/>
          <path d="M4 7h16"/><path d="M6 21h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"/>
        </svg>
        <span>Today’s Schedules</span>
      </div>

      <section class="profileCard" aria-label="Admin Profile">
        <div class="profileHead">Admin Profile</div>

        <div class="profileBody">
          <div class="profileLeft">
            <div class="bigAvatar" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M20 21a8 8 0 1 0-16 0"></path>
                <path d="M12 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"></path>
              </svg>
            </div>

            <div id="adminName" class="adminName">Admin</div>
            <div id="adminEmail" class="adminEmail">admin@gmail.com</div>

            <div class="leftMenu">
              <button id="tabProfile" type="button">Profile</button>
              <button id="tabNotif" type="button">Notifications</button>
              <button id="tabHistory" type="button">Login History</button>
            </div>

            <button id="logoutBtn" class="logoutBtn" type="button">LOG OUT</button>
          </div>

          <div id="profileRight" class="profileRight" aria-label="Right panel"></div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    // 🔁 Replace with YOUR Firebase config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const bellBtn    = document.getElementById("bellBtn");
    const todaysBtn  = document.getElementById("todaysBtn");

    const miniUser   = document.getElementById("miniUser");
    const miniAvatar = document.getElementById("miniAvatar");
    const miniName   = document.getElementById("miniName");

    const userMenu   = document.getElementById("userMenu");
    const menuEmail  = document.getElementById("menuEmail");
    const menuProfile= document.getElementById("menuProfile");
    const menuLogout = document.getElementById("menuLogout");

    const adminName  = document.getElementById("adminName");
    const adminEmail = document.getElementById("adminEmail");

    const tabProfile = document.getElementById("tabProfile");
    const tabNotif   = document.getElementById("tabNotif");
    const tabHistory = document.getElementById("tabHistory");

    const logoutBtn  = document.getElementById("logoutBtn");

    // ✅ FIXED: proper redirect when not logged in
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "/index.html";   // ✅ your login page
        return;
      }

      const name =
        (user.displayName && user.displayName.trim()) ||
        (user.email ? user.email.split("@")[0] : "") ||
        "Admin";

      const email = user.email || "—";

      miniName.textContent = name;
      menuEmail.textContent = email;

      adminName.textContent = name;
      adminEmail.textContent = email;

      miniAvatar.textContent = (name[0] || "A").toUpperCase();
    });

    function toggleMenu(force){
      const open = typeof force === "boolean" ? force : !userMenu.classList.contains("open");
      userMenu.classList.toggle("open", open);
    }
    miniUser.addEventListener("click", () => toggleMenu());
    miniUser.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleMenu(); }
    });
    document.addEventListener("click", (e) => {
      if (!userMenu.contains(e.target) && !miniUser.contains(e.target)) toggleMenu(false);
    });

    bellBtn.addEventListener("click", () => {
      window.location.href = "/content-notifications.html";
    });

    todaysBtn.addEventListener("click", () => {
      window.location.href = "/schedule.html";
    });

    tabProfile.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    tabNotif.addEventListener("click", () => {
      window.location.href = "/content-notifications.html";
    });

    tabHistory.addEventListener("click", () => {
      window.location.href = "/history.html";
    });

    menuProfile.addEventListener("click", () => {
      toggleMenu(false);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    async function doLogout(){
      try{
        await signOut(auth);
        window.location.href = "/index.html";  // ✅ also go back to login
      }catch(err){
        console.error(err);
        alert("Logout failed.");
      }
    }
    logoutBtn.addEventListener("click", doLogout);  
    menuLogout.addEventListener("click", doLogout);
  </script>
</body>
</html>

  <style>

    /* PAGE */

    /* buttons row */

      color:#fff;
      min-width: 78px;
      text-transform:uppercase;
      letter-spacing:.3px;
    }
    .btnReject{ background:#7a0f0f; }

    /* status badge shown on cards after action (optional, nice) */
    .cardStatus{
      margin-top:8px;
      display:flex;
      justify-content:center;
      font-size:11px;
      font-weight:700;
      letter-spacing:.3px;
      text-transform:uppercase;

    }
    .statusRejected{ color:#7a0f0f; }

    /* Topbar: ensure userMenu always above */
    .userMenu{ z-index:9999; }

    .emptyMsg{

      background:#d9d9d9;
      border-radius:12px;

    /* ✅ ONLY CHANGED: CONFIRMATION MODAL EXACT LIKE YOUR SCREENSHOT */
    .confirmOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.25);
      z-index:99999;

    .confirmOverlay.show{ display:flex; }

    .confirmBox{
      width: 520px;

    .confirmTitle{

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      orderBy,
      limit,
      doc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA0rJ7-NMwC-qDIziAiaH4AtSOOWQnEiqY",
      authDomain: "meatrace-7e6f0.firebaseapp.com",
      projectId: "meatrace-7e6f0",
      storageBucket: "meatrace-7e6f0.firebasestorage.app",
      messagingSenderId: "713463510875",
      appId: "1:713463510875:web:d057a91702ee3d11e88c7e",
      measurementId: "G-4SDSMBNVGN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ✅ We fetch from appointments (same as your appointment page)
    const apptCol = collection(db, "appointments");

    const safeText = (x) => (x ?? "").toString();
    const pad2 = (x) => String(x).padStart(2, "0");

    function toYMD(value) {
      if (!value) return "";
      if (typeof value === "object" && value.seconds) {
        const d = new Date(value.seconds * 1000);
        return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
      }
      if (value instanceof Date) {
        return `${value.getFullYear()}-${pad2(value.getMonth()+1)}-${pad2(value.getDate())}`;
      }
      if (typeof value === "string") {
        if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
        const d = new Date(value);
        if (!isNaN(d.getTime())) {
          return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
        }
      }
      return "";
    }

    function formatPrettyDate(value) {
      const ymd = toYMD(value);
      if (!ymd) return "—";
      const d = new Date(ymd + "T00:00:00");
      return d.toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });
    }

    function getApptDateField(a) {
      return (
        a.dateKey ??
        a.date ??
        a.appointmentDate ??
        a.scheduleDate ??
        a.appDate ??
        a.appointment_day ??
        a.moveAt ??
        null
      );
    }

    function getApptTimeField(a) {
      return (
        a.time ??
        a.timeSlot ??
        a.appointmentTime ??
        a.scheduleTime ??
        a.time_range ??
        "—"
      );
    }

    function normalizeAnimals(a){
      const out = [];
      const list = a.animalsBreakdown ?? a.animalsList ?? a.animals ?? null;

      if (Array.isArray(list)) {
        list.forEach(it => {
          const animal = safeText(it.type ?? it.animal ?? it.name ?? "—");
          const qty = Number(it.qty ?? it.quantity ?? it.count ?? 0) || 0;
          if (animal) out.push({ animal, qty });
        });
      } else {
        const s = safeText(a.selectedAnimals ?? "");
        if (s) {
          s.split(",").map(x => x.trim()).filter(Boolean).forEach(part => {
            const m = part.match(/(.+?)\s*x\s*(\d+)/i);
            if (m) out.push({ animal: m[1].trim(), qty: Number(m[2]) });
            else out.push({ animal: part, qty: 0 });
          });
        }
      }

      if (!out.length) out.push({ animal:"—", qty:0 });
      return out;
    }

    // user dropdown + logout (same behavior)
    const userChip = document.getElementById("userChip");
    const userBtn  = document.getElementById("userBtn");
    const userMenu = document.getElementById("userMenu");
    const logoutBtn = document.getElementById("logoutBtn");

    function openUserMenu(open) {
      userMenu.setAttribute("aria-hidden", String(!open));
      userChip.setAttribute("aria-expanded", String(open));
    }

    userBtn.addEventListener("click", () => {
      const isOpen = userMenu.getAttribute("aria-hidden") === "false";
      openUserMenu(!isOpen);
    });

    document.addEventListener("click", (e) => {
      if (!userChip.contains(e.target)) openUserMenu(false);
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") openUserMenu(false);
    });

    logoutBtn.addEventListener("click", async () => {
      try { await signOut(auth); } catch (e) {}
      window.location.href = "/login.html";
    });

    const adminNameEl = document.getElementById("adminName");
    const menuNameEl = document.getElementById("menuName");
    const menuEmailEl = document.getElementById("menuEmail");

    // ✅ ONLY CHANGED: CONFIRMATION JS (SCREENSHOT STYLE)
    const confirmOverlay = document.getElementById("confirmOverlay");
    const confirmBody = document.getElementById("confirmBody");
    const confirmPrimary = document.getElementById("confirmPrimary");
    const confirmCancel = document.getElementById("confirmCancel");

    let confirmResolver = null;
    let confirmType = "Passed"; // "Passed" | "Rejected"

    const PASS_TEXT = `Based on the veterinarian's assessment, the animals are in good health and meets all safety standards. By clicking 'PASSED', this appointment will be moved to the <b>Active Processing Queue</b>.`;

    const REJECT_TEXT = `Based on the veterinarian's assessment, the animal does not meet the health or safety requirements for processing. By clicking 'REJECTED', this appointment will automatically cancelled and the animal must be removed from the premises or moved to the quarantine area immediately.`;

    function openConfirm(type){
      confirmType = type;

      if (type === "Passed") {
        confirmBody.innerHTML = PASS_TEXT;
        confirmPrimary.textContent = "PASSED";
        confirmPrimary.classList.remove("cBtnReject");
        confirmPrimary.classList.add("cBtnPass");
      } else {
        confirmBody.innerHTML = REJECT_TEXT;
        confirmPrimary.textContent = "REJECTED";
        confirmPrimary.classList.remove("cBtnPass");
        confirmPrimary.classList.add("cBtnReject");
      }

      confirmOverlay.classList.add("show");
      confirmOverlay.setAttribute("aria-hidden","false");
      setTimeout(() => confirmPrimary.focus(), 0);

      return new Promise((resolve) => { confirmResolver = resolve; });
    }

    function closeConfirm(result){
      confirmOverlay.classList.remove("show");
      confirmOverlay.setAttribute("aria-hidden","true");
      const r = confirmResolver;
      confirmResolver = null;
      if (r) r(result);
    }

    confirmPrimary.addEventListener("click", () => closeConfirm(true));
    confirmCancel.addEventListener("click", () => closeConfirm(false));
    confirmOverlay.addEventListener("click", (e) => {
      if (e.target === confirmOverlay) closeConfirm(false);
    });
    document.addEventListener("keydown", (e) => {
      if (confirmOverlay.classList.contains("show") && e.key === "Escape") closeConfirm(false);
    });

    // page state
    let cachedAppointments = [];
    let activeFilter = "All"; // All | Passed | Rejected

    const cardsRow = document.getElementById("cardsRow");
    const emptyMsg = document.getElementById("emptyMsg");
    const pillRejected = document.getElementById("pillRejected");
    const pillPassed = document.getElementById("pillPassed");

    function setFilter(next){
      activeFilter = next;

      pillRejected.classList.toggle("active", activeFilter === "Rejected");
      pillPassed.classList.toggle("active", activeFilter === "Passed");

      renderCards();
    }

    pillRejected.addEventListener("click", () => setFilter(activeFilter === "Rejected" ? "All" : "Rejected"));
    pillPassed.addEventListener("click", () => setFilter(activeFilter === "Passed" ? "All" : "Passed"));

    // search
    document.getElementById("searchInput").addEventListener("input", () => renderCards());

    function getVetStatus(a){
      // ✅ store vet result inside appointment doc
      const v1 = a.vetStatus;
      const v2 = a.vetInspection?.status;
      const v3 = a.inspectionStatus;
      return safeText(v1 ?? v2 ?? v3 ?? ""); // "Passed" / "Rejected" / ""
    }

    function setVetStatusLocal(docId, status){
      const idx = cachedAppointments.findIndex(x => x.docId === docId);
      if (idx !== -1) {
        cachedAppointments[idx].vetStatus = status;
      }
    }

    function buildCard(a){
      const card = document.createElement("div");
      card.className = "vetCard";

      const name = safeText(a.name ?? a.fullName ?? a.customerName ?? "—");
      const address = safeText(a.address ?? a.location ?? "—");
      const number = safeText(a.number ?? a.phone ?? a.contact ?? "—");
      const datePretty = formatPrettyDate(getApptDateField(a));
      const time = safeText(getApptTimeField(a));

      const animals = normalizeAnimals(a);
      const total = animals.reduce((sum, it) => sum + (Number(it.qty)||0), 0);

      const vetStatus = getVetStatus(a).toLowerCase();

      // animals rows html
      const animalsHtml = animals.map(it => `
        <div class="animalsRow">
          <span>${safeText(it.animal)}</span>
          <span>${Number(it.qty)||0}</span>
        </div>
      `).join("");

      card.innerHTML = `
        <div class="vetCardHead">Vet Inspection</div>

        <div class="vetCardBody">
          <div class="metaRow"><span class="metaLabel">Name</span><span class="metaValue">${name}</span></div>
          <div class="metaRow"><span class="metaLabel">Address</span><span class="metaValue">${address}</span></div>
          <div class="metaRow"><span class="metaLabel">Phone Number</span><span class="metaValue">${number}</span></div>
          <div class="metaRow"><span class="metaLabel">Date</span><span class="metaValue">${datePretty}</span></div>
          <div class="metaRow"><span class="metaLabel">Time</span><span class="metaValue">${time}</span></div>

          <div class="animalsBox">
            <div class="animalsHead"><span>Animals</span><span>QTY</span></div>
            ${animalsHtml}
            <div class="animalsDivider"></div>
            <div class="animalsTotal"><span>Total:</span><span>${total}</span></div>
          </div>

          <div class="vetActions">
            <button class="vetBtn btnReject" type="button">REJECTED</button>
            <button class="vetBtn btnPass" type="button">PASSED</button>
          </div>

          ${(vetStatus === "passed" || vetStatus === "rejected") ? `
            <div class="cardStatus ${vetStatus === "passed" ? "statusPassed" : "statusRejected"}">
              ${vetStatus === "passed" ? "PASSED" : "REJECTED"}
            </div>
          ` : ``}
        </div>
      `;

      const rejectBtn = card.querySelector(".btnReject");
      const passBtn = card.querySelector(".btnPass");

      // disable buttons if already decided
      if (vetStatus === "passed" || vetStatus === "rejected") {
        rejectBtn.disabled = true;
        passBtn.disabled = true;
        rejectBtn.style.opacity = .6;
        passBtn.style.opacity = .6;
        rejectBtn.style.cursor = "not-allowed";
        passBtn.style.cursor = "not-allowed";
      }

      rejectBtn.addEventListener("click", async () => {
        const ok = await openConfirm("Rejected");
        if (!ok) return;
        await updateVetStatus(a.docId, "Rejected");
      });

      passBtn.addEventListener("click", async () => {
        const ok = await openConfirm("Passed");
        if (!ok) return;
        await updateVetStatus(a.docId, "Passed");
      });

      return card;
    }

    function renderCards(){
      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      cardsRow.innerHTML = "";

      let items = [...cachedAppointments];

      // ✅ Only show appointments that are ready for vet inspection:
      // - hide Cancelled and Completed appointments
      items = items.filter(a => {
        const st = safeText(a.status ?? "Pending").toLowerCase();
        return st !== "cancelled" && st !== "completed";
      });

      // filter by pill
      if (activeFilter !== "All") {
        items = items.filter(a => safeText(getVetStatus(a)).toLowerCase() === activeFilter.toLowerCase());
      }

      // search match
      if (q) {
        items = items.filter(a => {
          const blob = [
            a.name, a.fullName, a.customerName,
            a.address, a.location,
            a.number, a.phone, a.contact,
            a.selectedAnimals
          ].map(safeText).join(" ").toLowerCase();
          return blob.includes(q);
        });
      }

      if (!items.length){
        emptyMsg.style.display = "";
        return;
      }
      emptyMsg.style.display = "none";

      items.forEach(a => cardsRow.appendChild(buildCard(a)));
    }

    async function loadAppointments(){
      let snap = null;
      try {
        snap = await getDocs(query(apptCol, orderBy("createdAt","desc"), limit(300)));
      } catch (e1) {
        try {
          snap = await getDocs(query(apptCol, orderBy("moveAt","desc"), limit(300)));
        } catch (e2) {
          snap = await getDocs(query(apptCol, limit(300)));
        }
      }

      const arr = [];
      snap.forEach(d => arr.push({ docId: d.id, ...d.data() }));

      // sort by appointment date desc (safe)
      arr.sort((a,b) => {
        const da = new Date((toYMD(getApptDateField(a)) || "1970-01-01") + "T00:00:00").getTime();
        const dbb = new Date((toYMD(getApptDateField(b)) || "1970-01-01") + "T00:00:00").getTime();
        return dbb - da;
      });

      cachedAppointments = arr;
      renderCards();
    }

    async function updateVetStatus(docId, status){
      try{
        // ✅ store inside the appointment document
        await updateDoc(doc(db, "appointments", docId), {
          vetStatus: status,
          vetUpdatedAt: new Date(),
          vetInspection: { status, updatedAt: new Date() }
        });

        setVetStatusLocal(docId, status);
        renderCards();
      }catch(err){
        console.error(err);
        alert("Failed to update vet inspection. Check Firestore rules.");
      }
    }

    // auth init
    let started = false;
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      const name = user.displayName || "Admin";
      const email = user.email || "admin@email.com";
      adminNameEl.textContent = name;
      menuNameEl.textContent = name;
      menuEmailEl.textContent = email;

      if (started) return;
      started = true;

      try{
        await loadAppointments();
      }catch(err){
        console.error(err);
        emptyMsg.textContent = "Error loading vet inspections.";
        emptyMsg.style.display = "";
      }
    });
  </script>
</body>
</html>
